<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#F4F4F4"/>

  <!-- Body/Shoulders (Hijab drape) -->
  <path d="M20 200 C30 140 50 120 70 100 C70 100 130 100 130 100 C150 120 170 140 180 200 Z" fill="#4A4545"/>
  <!-- Shoulder folds -->
  <path d="M40 200 C50 160 60 130 70 100" fill="none" stroke="#3A3535" stroke-width="4"/>
  <path d="M160 200 C150 160 140 130 130 100" fill="none" stroke="#3A3535" stroke-width="4"/>

  <!-- Inner Hijab (under scarf) -->
  <path d="M70 50 C70 40 130 40 130 50 C130 65 110 75 100 75 C90 75 70 65 70 50 Z" fill="#2E2B2B"/>

  <!-- Face area (skin) -->
  <path d="M72 65 C72 65 85 95 100 95 C115 95 128 65 128 65 C128 65 115 50 100 50 C85 50 72 65 72 65 Z" fill="#F5D0B5"/>

  <!-- Eyes -->
  <!-- Left Eye -->
  <path d="M78 72 C82 68 88 68 93 72 C88 74 82 74 78 72 Z" fill="#FFFFFF"/>
  <circle cx="85.5" cy="71" r="3" fill="#3B2A1E"/>
  <circle cx="86" cy="70" r="1" fill="#FFFFFF"/>
  <!-- Right Eye -->
  <path d="M107 72 C112 68 118 68 122 72 C118 74 112 74 107 72 Z" fill="#FFFFFF"/>
  <circle cx="114.5" cy="71" r="3" fill="#3B2A1E"/>
  <circle cx="115" cy="70" r="1" fill="#FFFFFF"/>

  <!-- Eyebrows -->
  <path d="M76 65 Q85 62 94 66" fill="none" stroke="#3B2A1E" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M106 66 Q115 62 124 65" fill="none" stroke="#3B2A1E" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eyelashes -->
  <path d="M78 72 Q85 68 93 72" fill="none" stroke="#1A1515" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M107 72 Q115 68 122 72" fill="none" stroke="#1A1515" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Light Blue Niqab (Face veil) -->
  <path d="M68 85 C80 82 120 82 132 85 L145 200 L55 200 Z" fill="#A8C4CB"/>
  <!-- Niqab Folds/Shadows -->
  <path d="M68 85 C80 120 90 180 95 200" fill="none" stroke="#90AEB5" stroke-width="3"/>
  <path d="M132 85 C120 120 110 180 105 200" fill="none" stroke="#90AEB5" stroke-width="3"/>
  <!-- Top edge of Niqab -->
  <path d="M68 85 C80 82 120 82 132 85" fill="none" stroke="#90AEB5" stroke-width="2"/>

  <!-- Main Hijab wrap (Outer scarf) -->
  <path d="M65 110 C60 80 70 30 100 25 C130 30 140 80 135 110 C145 130 155 170 170 200 L180 200 C150 100 135 20 100 15 C65 20 50 100 20 200 L30 200 C45 170 55 130 65 110 Z" fill="#4A4545"/>
  <!-- Highlight on Hijab top -->
  <path d="M80 30 C90 25 110 25 120 30" fill="none" stroke="#5A5555" stroke-width="3" stroke-linecap="round"/>
</svg>
